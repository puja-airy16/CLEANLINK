<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Report Submitted — CleanLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css" />
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body {
      margin: 0;
      font-family: "Inter", system-ui, Arial, sans-serif;
      background: linear-gradient(135deg, #f3fff5, #dcf7e1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      color: #0f3f27;
      overflow: hidden;
    }

    .success-card {
      background: #ffffffd8;
      padding: 40px 50px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      position: relative;
      z-index: 10;
      max-width: 500px;
    }

    .icon {
      background: var(--green, #1f7a4c);
      color: #fff;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    .icon svg {
      width: 50px;
      height: 50px;
    }

    h1 {
      font-size: 2rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 25px;
    }

    .btn {
      background: var(--green, #1f7a4c);
      color: #fff;
      padding: 12px 28px;
      border-radius: 8px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .btn:hover {
      transform: translateY(-4px);
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.25);
    }

    /* Confetti animation */
    .confetti {
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--accent, #7fc04c);
      top: -10px;
      animation: fall 3s linear infinite;
      opacity: 0.9;
    }

    @keyframes fall {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="success-card">
    <div class="icon" data-lucide="check-circle"></div>
    <h1>Thank You!</h1>
    <p>Your report has been successfully submitted. Our staff will assign it to an NGO shortly.</p>
    <a href="index.html" class="btn">Go Back Home</a>
  </div>

  <script>
    // ✅ Load the success icon
    lucide.createIcons();

    // ✅ Generate random falling confetti
    for (let i = 0; i < 40; i++) {
      const confetti = document.createElement('div');
      confetti.classList.add('confetti');
      confetti.style.left = Math.random() * 100 + 'vw';
      confetti.style.backgroundColor = ['#7fc04c', '#a3e09c', '#baf2bb'][Math.floor(Math.random() * 3)];
      confetti.style.animationDelay = Math.random() * 3 + 's';
      confetti.style.animationDuration = 2 + Math.random() * 3 + 's';
      document.body.appendChild(confetti);
    }

    // ✅ Redirect to home after 6 seconds
    setTimeout(() => {
      window.location.href = "index.html";
    }, 6000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>CleanLink Staff Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      background: #f6fdf8;
      color: #222;
    }

    header {
      background: #1f7a4c;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }

    header .logo {
      font-weight: 700;
      font-size: 1.4rem;
    }

    header nav a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    #loginSection {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 85vh;
    }

    .login-card {
      background: white;
      padding: 35px;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      width: 350px;
      text-align: center;
    }

    .login-card input {
      width: 100%;
      margin-bottom: 12px;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .login-card button {
      background: #1f7a4c;
      color: white;
      width: 100%;
      border: none;
      border-radius: 8px;
      padding: 10px;
      font-weight: 600;
      cursor: pointer;
    }

    #dashboardSection { display: none; padding: 20px; }

    .topbar {
      background: #1f7a4c;
      color: white;
      padding: 15px 20px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    .filter-bar {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .filter-bar input, .filter-bar select {
      padding: 8px 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 0.9rem;
    }

    .cards {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 15px;
      flex: 1;
      min-width: 280px;
    }

    #map { height: 400px; border-radius: 10px; margin-top: 20px; }

    button.action {
      padding: 6px 10px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 500;
    }

    button.assign { background: #ffb347; color: white; }
    button.complete { background: #4CAF50; color: white; }

    .legend { margin-top: 10px; display: flex; gap: 15px; }
    .legend span { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; }
    .legend div { width: 12px; height: 12px; border-radius: 50%; }
    .red div { background: red; }
    .orange div { background: orange; }
    .green div { background: green; }

    #imageModal {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.7);
      justify-content:center;
      align-items:center;
      z-index:9999;
      animation: fadeIn 0.3s ease;
    }

    #imageModal img {
      max-width:90%;
      max-height:90%;
      border-radius:10px;
      box-shadow:0 0 20px rgba(255,255,255,0.3);
    }

    #closeModal {
      position:absolute;
      top:25px;
      right:40px;
      font-size:2rem;
      color:white;
      cursor:pointer;
      font-weight:600;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">CLEAN<span style="color:#bdf5c1;">LINK</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="report.html">Report</a>
      <a href="volunteer.html">Volunteer</a>
    </nav>
  </header>

  <!-- LOGIN -->
  <section id="loginSection">
    <div class="login-card">
      <h2>Staff Login</h2>
      <input type="text" id="username" placeholder="Username" required />
      <input type="password" id="password" placeholder="Password" required />
      <button id="loginBtn">Login</button>
      <div id="loginMsg" style="margin-top:8px;color:red;"></div>
    </div>
  </section>

  <!-- DASHBOARD -->
  <section id="dashboardSection">
    <div class="topbar">
      <h2 id="welcomeText">Welcome, Staff</h2>
      <button id="logoutBtn" style="background:white;color:#1f7a4c;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;">Logout</button>
    </div>

    <div class="filter-bar">
      <input type="text" id="searchBox" placeholder="Search by keyword or location...">
      <select id="statusFilter">
        <option value="all">All Reports</option>
        <option value="unassigned">Unassigned</option>
        <option value="assigned">Assigned</option>
        <option value="completed">Completed</option>
      </select>
      <button id="filterBtn" style="background:#1f7a4c;color:white;border:none;border-radius:6px;padding:8px 12px;cursor:pointer;">Apply</button>
      <button id="exportCSV" style="background:#007bff;color:white;border:none;border-radius:6px;padding:8px 12px;cursor:pointer;">Export CSV</button>
      <button id="exportPDF" style="background:#d9534f;color:white;border:none;border-radius:6px;padding:8px 12px;cursor:pointer;">Export PDF</button>
    </div>

    <div class="cards">
      <div class="card">
        <h3>Waste Reports</h3>
        <div id="reportsList"></div>
      </div>
      <div class="card">
        <h3>NGO List</h3>
        <ul id="ngoList" style="list-style:none;padding-left:0;"></ul>
      </div>
      <div class="card">
        <h3>Volunteers</h3>
        <ul id="volunteerList" style="list-style:none;padding-left:0;"></ul>
      </div>
    </div>

    <div class="card" style="margin-top:20px;">
      <h3>Live Map</h3>
      <div id="map"></div>
      <div class="legend">
        <span class="red"><div></div>Unassigned</span>
        <span class="orange"><div></div>Assigned</span>
        <span class="green"><div></div>Completed</span>
      </div>
    </div>
  </section>

  <script>
    let reports = [], ngos = [], volunteers = [], map, markers = [];

    const loginSection = document.getElementById('loginSection');
    const dashboardSection = document.getElementById('dashboardSection');
    const loginMsg = document.getElementById('loginMsg');
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    loginBtn.onclick = async () => {
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      if (!username || !password) return loginMsg.textContent = "Please enter credentials";
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({username,password})
      });
      const data = await res.json();
      if (!data.ok) return loginMsg.textContent = "Invalid credentials";
      loginSection.style.display = 'none';
      dashboardSection.style.display = 'block';
      loadDashboard();
    };

    logoutBtn.onclick = () => { location.reload(); };

    async function loadDashboard() {
      const resNgos = await fetch('/api/ngos');
      ngos = await resNgos.json();
      document.getElementById('ngoList').innerHTML = ngos.map(n => `<li><b>${n.name}</b><br>${n.contact}</li>`).join('');
      const resVol = await fetch('/api/volunteers');
      volunteers = await resVol.json();
      document.getElementById('volunteerList').innerHTML = volunteers.map(v =>
        `<li><b>${v.name}</b> (${v.area || 'No area'})<br>${v.email}<br>
         <button onclick="generateCert('${v.id}')" class="action complete">🎓 Certificate</button></li>`).join('');
      const resRep = await fetch('/api/reports');
      reports = await resRep.json();
      renderReports(reports);
      updateMap(reports);
    }

    function renderReports(data) {
      const list = document.getElementById('reportsList');
      list.innerHTML = data.map(r => `
        <div style="border-bottom:1px solid #eee;padding:10px 0;display:flex;align-items:center;gap:10px;">
          ${r.image ? `<img src="${r.image}" style="width:60px;height:60px;border-radius:6px;object-fit:cover;cursor:pointer;border:1px solid #ccc;" onclick="openImage('${r.image}')">`
          : `<div style="width:60px;height:60px;border-radius:6px;background:#eee;display:flex;align-items:center;justify-content:center;font-size:12px;color:#888;">No Img</div>`}
          <div style="flex:1;">
            <b>${r.description}</b><br>
            <small>${r.location || ''}</small><br>
            <span>Status: ${r.status}</span><br>
            ${r.status==='unassigned'
              ? `<select id="ngo-${r.id}">${ngos.map(n=>`<option value="${n.id}">${n.name}</option>`).join('')}</select>
                 <button class="action assign" onclick="assign('${r.id}')">Assign</button>`
              : r.status==='assigned'
                ? `<button class="action complete" onclick="complete('${r.id}')">Mark Complete</button>`
                : `<span style="color:green;">✅ Completed</span>`}
          </div></div>`).join('');
    }

    async function assign(id) {
      const ngoId=document.getElementById(`ngo-${id}`).value;
      await fetch(`/api/reports/${id}/assign`, {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({ngoId})});
      loadDashboard();
    }
    async function complete(id) {
      await fetch(`/api/reports/${id}/complete`, {method:'POST'});
      loadDashboard();
    }

    function initMap() {
      map = L.map('map').setView([20.59,78.96],5);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap'}).addTo(map);
    }

    function updateMap(reports) {
      if (!map) initMap();
      markers.forEach(m=>m.remove());
      markers=[];
      const coords=[];
      reports.forEach(r=>{
        if(r.lat&&r.lng){
          coords.push([r.lat,r.lng]);
          const color=r.status==='completed'?'green':r.status==='assigned'?'orange':'red';
          const icon=L.divIcon({className:'',html:`<div style="background:${color};width:16px;height:16px;border-radius:50%;border:2px solid white;"></div>`});
          const m=L.marker([r.lat,r.lng],{icon}).addTo(map).bindPopup(`<b>${r.description}</b><br>${r.location||''}<br>Status: ${r.status}`);
          markers.push(m);
        }
      });
      if(coords.length) map.fitBounds(L.latLngBounds(coords),{padding:[50,50]});
    }

    function openImage(src){
      document.getElementById('modalImg').src=src;
      document.getElementById('imageModal').style.display='flex';
    }

    function generateCert(id){ window.open(`/api/certificate/${id}`,'_blank'); }
  </script>

  <!-- Image Modal -->
  <div id="imageModal">
    <span id="closeModal">&times;</span>
    <img id="modalImg" src="">
  </div>

  <script>
    const modal=document.getElementById('imageModal');
    const closeModal=document.getElementById('closeModal');
    closeModal.onclick=()=>modal.style.display='none';
    modal.onclick=e=>{if(e.target===modal)modal.style.display='none';};
  </script>
</body>
</html>

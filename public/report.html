<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Report Waste — CleanLink</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Icons & Font -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    body {
      font-family: "Poppins", sans-serif;
      margin: 0;
      background: #f6fdf8;
      color: #222;
    }

    /* Header */
    header {
      background: #1f7a4c;
      color: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 20px;
    }
    header .logo {
      font-weight: 700;
      font-size: 1.4rem;
    }
    header .accent {
      color: #bdf5c1;
    }
    header nav a {
      color: white;
      text-decoration: none;
      margin-left: 15px;
      font-weight: 500;
    }
    header nav a:hover {
      text-decoration: underline;
    }

    /* Container */
    .container {
      max-width: 650px;
      margin: 50px auto;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      padding: 35px 40px;
      position: relative;
    }

    h1 {
      text-align: center;
      color: #1f7a4c;
      margin-bottom: 10px;
      font-size: 1.8rem;
    }

    p.subtitle {
      text-align: center;
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 25px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    input, textarea {
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 1rem;
      transition: 0.2s ease;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #1f7a4c;
      box-shadow: 0 0 4px rgba(31, 122, 76, 0.4);
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input[type="file"] {
      background: #f0f7f2;
      border: 1px dashed #1f7a4c;
      padding: 12px;
      cursor: pointer;
    }

    button {
      background: #1f7a4c;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease;
    }
    button:hover {
      background: #17613b;
      transform: translateY(-2px);
    }

    #preview {
      width: 100%;
      max-height: 250px;
      object-fit: cover;
      border-radius: 8px;
      margin-top: 8px;
      display: none;
    }

    #msg {
      text-align: center;
      margin-top: 12px;
      font-weight: 600;
    }

    /* Location status */
    .location-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 0.9rem;
      color: #555;
    }
    .location-status span {
      color: #1f7a4c;
      font-weight: 600;
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #888;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header>
    <div class="logo">CLEAN<span class="accent">LINK</span></div>
    <nav>
      <a href="index.html">Home</a>
      <a href="report.html" class="active">Report Waste</a>
      <a href="staff.html">Staff</a>
    </nav>
  </header>

  <div class="container">
    <h1>Report Waste</h1>
    <p class="subtitle">Upload a photo of waste near your area. CleanLink will alert nearby NGOs to take action.</p>

    <form id="reportForm">
      <input type="text" id="name" placeholder="Your Name" required />
      <textarea id="description" placeholder="Describe the waste location or type..." required></textarea>
      <input type="file" id="photo" accept="image/*" required />
      <input type="text" id="location" placeholder="Your Area / Landmark (optional)" />

      <!-- Hidden GPS fields -->
      <input type="hidden" id="lat" />
      <input type="hidden" id="lng" />

      <div class="location-status" id="locationStatus">
        <i data-lucide="map-pin"></i> Detecting your location...
      </div>

      <button type="submit">Submit Report</button>
    </form>

    <img id="preview" />
    <div id="msg"></div>
  </div>

  <footer>© 2025 CleanLink Community Waste Management</footer>

  <script>
    lucide.createIcons();

    const form = document.getElementById('reportForm');
    const msg = document.getElementById('msg');
    const photo = document.getElementById('photo');
    const preview = document.getElementById('preview');
    const latInput = document.getElementById('lat');
    const lngInput = document.getElementById('lng');
    const locationStatus = document.getElementById('locationStatus');

    // ✅ Show preview
    photo.addEventListener('change', e => {
      const file = e.target.files[0];
      if (file) {
        preview.src = URL.createObjectURL(file);
        preview.style.display = 'block';
      }
    });

    // ✅ Detect user geolocation
    if ("geolocation" in navigator) {
      navigator.geolocation.getCurrentPosition(pos => {
        latInput.value = pos.coords.latitude;
        lngInput.value = pos.coords.longitude;
        locationStatus.innerHTML = `<i data-lucide="map-pin"></i> <span>Location detected!</span>`;
        lucide.createIcons();
      }, err => {
        locationStatus.innerHTML = `<i data-lucide="alert-triangle"></i> <span>Unable to get location</span>`;
        lucide.createIcons();
      });
    } else {
      locationStatus.innerHTML = `<i data-lucide="alert-triangle"></i> <span>Geolocation not supported</span>`;
      lucide.createIcons();
    }

    // ✅ Submit form
    form.addEventListener('submit', async e => {
      e.preventDefault();
      msg.textContent = "Uploading report...";
      msg.style.color = "#555";

      const data = new FormData();
      data.append("name", document.getElementById('name').value);
      data.append("description", document.getElementById('description').value);
      data.append("location", document.getElementById('location').value);
      data.append("lat", latInput.value);
      data.append("lng", lngInput.value);
      data.append("photo", photo.files[0]);

      try {
        const res = await fetch('/api/reports', { method: 'POST', body: data });
        const json = await res.json();
        if (json.ok) {
          msg.textContent = "✅ Report submitted successfully!";
          msg.style.color = "#1f7a4c";
          form.reset();
          preview.style.display = 'none';
          locationStatus.innerHTML = `<i data-lucide="map-pin"></i> <span>Location saved!</span>`;
          lucide.createIcons();
        } else {
          msg.textContent = "⚠️ Error submitting report.";
          msg.style.color = "red";
        }
      } catch {
        msg.textContent = "⚠️ Network error. Try again.";
        msg.style.color = "red";
      }
    });
  </script>
</body>
</html>
